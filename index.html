<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MORCEGO — Cardápio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #080609;
  --bg2:   #0d0b12;
  --bg3:   #131018;
  --card:  #110e16;
  --card-h:#181523;
  --gold:  #c9a227;
  --gold2: #8a6d18;
  --navy:  #1a1f4b;
  --cream: #f0e8d0;
  --dim:   #9e9278;
  --green: #3ecf6e;
  --bord:  rgba(201,162,39,.12);
  --bord2: rgba(201,162,39,.35);
  --glow:  rgba(201,162,39,.15);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
  --bottom-nav-h: 68px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:2px}

/* ═══ CANVAS ═══ */
#batCanvas{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.7}

/* ═══ FLOATING PARTICLES ═══ */
#floatParticles{position:fixed;inset:0;pointer-events:none;z-index:2;overflow:hidden}
.fp{position:absolute;bottom:-40px;opacity:0;animation:floatUp linear forwards;will-change:transform,opacity}
@keyframes floatUp{
  0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0}
  8%{opacity:.35}
  85%{opacity:.12}
  100%{transform:translateY(-105vh) translateX(var(--fx,20px)) rotate(var(--fr,180deg));opacity:0}
}

/* ═══ NOISE OVERLAY ═══ */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:3;opacity:.3;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.05'/%3E%3C/svg%3E");
}

/* ═══ HERO ═══ */
#hero{
  position:fixed;inset:0;z-index:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 40%, #1a1f4b 0%, #080609 65%);
  cursor:pointer;
  transition:opacity .6s ease, transform .6s ease;
  padding:2rem;
  padding-top:calc(2rem + var(--safe-top));
}
#hero.out{opacity:0;transform:translateY(-20px);pointer-events:none}

.hero-bat-wrap{position:relative;margin-bottom:2rem}
.hero-bat-wrap svg{width:min(310px,88vw);height:auto;filter:drop-shadow(0 0 35px rgba(201,162,39,.45))}

/* Wing flap */
.wl{transform-origin:-12px -4px;animation:flapL 2.4s ease-in-out infinite}
.wr{transform-origin:12px -4px;animation:flapR 2.4s ease-in-out infinite}
@keyframes flapL{0%,100%{transform:rotate(0deg) scaleY(1)}50%{transform:rotate(10deg) scaleY(.6)}}
@keyframes flapR{0%,100%{transform:rotate(0deg) scaleY(1)}50%{transform:rotate(-10deg) scaleY(.6)}}

/* Eye blink */
.eye-iris{transform-origin:0px 6px;animation:blink 6s ease-in-out infinite}
@keyframes blink{0%,88%,100%{transform:scaleY(1)}93%{transform:scaleY(.06)}}

/* Sonar rings */
.sr{transform-origin:0px 6px;animation:sonar 2.8s ease-out infinite}
.sr2{animation-delay:.93s}
.sr3{animation-delay:1.86s}
@keyframes sonar{0%{transform:scale(.7);opacity:.65}100%{transform:scale(3);opacity:0}}

.hero-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.8rem,12vw,5rem);
  font-weight:900;letter-spacing:.15em;
  color:var(--cream);text-align:center;line-height:1;
  text-shadow:0 0 40px rgba(201,162,39,.3);
}
.hero-sub{
  font-size:.72rem;letter-spacing:.4em;text-transform:uppercase;
  color:var(--dim);font-family:'DM Mono',monospace;
  margin-top:.6rem;margin-bottom:2.5rem;text-align:center;
}
.hero-cta{
  background:var(--gold);color:var(--bg);
  border:none;border-radius:50px;
  padding:.9rem 2.5rem;
  font-family:'DM Sans',sans-serif;font-weight:600;
  font-size:.85rem;letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;
  box-shadow:0 0 30px rgba(201,162,39,.4);
  transition:all .2s;
  animation:heroPulse 2s ease-in-out infinite;
}
.hero-cta:active{transform:scale(.96)}
@keyframes heroPulse{0%,100%{box-shadow:0 0 30px rgba(201,162,39,.4)}50%{box-shadow:0 0 55px rgba(201,162,39,.75)}}
.hero-hint{font-size:.65rem;color:var(--dim);margin-top:1rem;letter-spacing:.1em;opacity:.6}
.hero-address{font-size:.65rem;color:var(--dim);letter-spacing:.06em;margin-top:.4rem;margin-bottom:1.5rem;text-align:center;opacity:.75}
.dot.closed{background:#e53e3e!important;box-shadow:0 0 6px #e53e3e!important}
.status-txt.closed{color:#e53e3e!important}

/* ═══ APP WRAPPER ═══ */
#app{position:relative;z-index:10;padding-bottom:calc(var(--bottom-nav-h) + var(--safe-bottom))}

/* ═══ HEADER ═══ */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(8,6,9,.95);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--bord);
  padding-top:var(--safe-top);
}
.header-inner{
  display:flex;align-items:center;gap:.8rem;
  padding:.75rem 1rem;max-width:1400px;margin:0 auto;
}
.header-bat{width:36px;height:26px;flex-shrink:0;position:relative}
.header-bat svg{width:100%;height:100%}
.hbw-l{transform-origin:-4px 0px;animation:flapL 2.4s ease-in-out infinite}
.hbw-r{transform-origin:4px 0px;animation:flapR 2.4s ease-in-out infinite}
.sonar-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.sonar-h{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--gold);opacity:0;
  animation:sonarH 3s ease-out infinite;pointer-events:none;
}
.sonar-h2{animation-delay:1s}
.sonar-h3{animation-delay:2s}
@keyframes sonarH{0%{transform:translate(-50%,-50%) scale(.5);opacity:.6}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}}
.header-name{
  font-family:'Playfair Display',serif;
  font-size:1.15rem;font-weight:900;
  letter-spacing:.1em;color:var(--gold);
  text-transform:uppercase;line-height:1;
}
.header-status{display:flex;align-items:center;gap:5px;margin-left:auto}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:dotPulse 2s infinite}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.5}}
.status-txt{font-size:.62rem;font-family:'DM Mono',monospace;color:var(--green);letter-spacing:.08em}
.header-search-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--bord);background:transparent;
  color:var(--dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.header-search-btn:active{background:var(--glow);color:var(--gold);border-color:var(--bord2)}
.search-bar{
  position:absolute;top:100%;left:0;right:0;
  background:var(--bg2);border-bottom:1px solid var(--bord);
  padding:.75rem 1rem;
  display:none;z-index:99;
}
.search-bar.open{display:block}
.search-input{
  width:100%;background:var(--bg3);border:1px solid var(--bord);
  border-radius:8px;padding:.6rem 1rem .6rem 2.4rem;
  color:var(--cream);font-family:'DM Sans',sans-serif;
  font-size:.85rem;outline:none;
  background-image:url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238a6d18' stroke-width='2.5' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cpath d='m21 21-4.35-4.35'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:10px center;
}
.search-input::placeholder{color:var(--dim)}
.search-input:focus{border-color:var(--gold2)}
.header-search-desktop{flex:1;max-width:320px;margin-left:auto;display:none}
.header-search-desktop .search-input{background-image:url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238a6d18' stroke-width='2.5' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cpath d='m21 21-4.35-4.35'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:10px center}

/* ═══ BOTTOM NAV (mobile) ═══ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(8,6,9,.97);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--bord);
  overflow-x:auto;scrollbar-width:none;
  padding:0 .5rem;
  padding-bottom:var(--safe-bottom);
  height:calc(var(--bottom-nav-h) + var(--safe-bottom));
  display:flex;align-items:center;
}
.bottom-nav::-webkit-scrollbar{display:none}
.bottom-nav-inner{display:flex;gap:.3rem;white-space:nowrap;padding:.5rem 0}
.bnav-item{
  display:inline-flex;flex-direction:column;align-items:center;gap:2px;
  padding:.4rem .7rem;border-radius:10px;cursor:pointer;
  text-decoration:none;color:var(--dim);
  font-size:.58rem;letter-spacing:.05em;
  border:1px solid transparent;
  transition:all .2s;white-space:nowrap;min-width:52px;
  -webkit-touch-callout:none;user-select:none;
}
.bnav-item .bnav-icon{font-size:1.2rem;line-height:1;transition:transform .2s}
.bnav-item:active .bnav-icon{transform:scale(.8)}
.bnav-item.active{color:var(--gold);background:var(--glow);border-color:var(--bord2)}

/* ═══ LAYOUT ═══ */
.layout{max-width:1400px;margin:0 auto;display:flex;align-items:flex-start}

/* ═══ SIDEBAR (desktop only) ═══ */
.sidebar{display:none}

/* ═══ MAIN ═══ */
.main{flex:1;padding:1.2rem 1rem 2rem;min-width:0}

/* ═══ SECTION ═══ */
.section{margin-bottom:2.5rem;opacity:0;transform:translateY(16px);animation:fadeUp .5s forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.section:nth-child(1){animation-delay:.05s}.section:nth-child(2){animation-delay:.1s}
.section:nth-child(3){animation-delay:.15s}.section:nth-child(4){animation-delay:.2s}
.section:nth-child(5){animation-delay:.25s}.section:nth-child(6){animation-delay:.3s}
.section:nth-child(7){animation-delay:.35s}.section:nth-child(8){animation-delay:.4s}
.section:nth-child(9){animation-delay:.45s}.section:nth-child(10){animation-delay:.5s}
.section:nth-child(11){animation-delay:.55s}.section:nth-child(12){animation-delay:.6s}
.section-header{
  display:flex;align-items:center;gap:.7rem;
  margin-bottom:1rem;padding-bottom:.8rem;
  border-bottom:1px solid var(--bord);
}
.section-emoji{font-size:1.2rem}
.section-title{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;color:var(--cream);line-height:1}
.section-count{font-size:.6rem;font-family:'DM Mono',monospace;color:var(--gold2);letter-spacing:.15em;text-transform:uppercase;margin-left:auto}

/* ═══ GRID ═══ */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.grid-wide{grid-template-columns:1fr 1fr}

/* ═══ CARD ═══ */
.card{
  background:var(--card);border:1px solid var(--bord);
  border-radius:10px;overflow:hidden;cursor:pointer;
  display:flex;flex-direction:column;
  transition:border-color .2s;
  -webkit-touch-callout:none;user-select:none;
}
.card:active{border-color:var(--bord2);background:var(--card-h)}
.card-img{width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--bg3);flex-shrink:0;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s}
.card:active .card-img img{transform:scale(1.04)}
.card-tag{
  position:absolute;top:6px;left:6px;
  background:rgba(8,6,9,.85);border:1px solid var(--bord2);
  color:var(--gold);font-size:.52rem;font-family:'DM Mono',monospace;
  letter-spacing:.12em;text-transform:uppercase;
  padding:2px 6px;border-radius:3px;
}
.card-tag.vegano{color:#5ecf6e;border-color:rgba(94,207,110,.4)}
.card-body{padding:.7rem;display:flex;flex-direction:column;gap:.3rem;flex:1}
.card-name{font-family:'Playfair Display',serif;font-size:.88rem;font-weight:700;color:var(--cream);line-height:1.2}
.card-desc{font-size:.68rem;color:var(--dim);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.card-footer{display:flex;align-items:flex-end;justify-content:space-between;margin-top:.4rem}
.card-price{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--gold)}
.card-price-prefix{font-size:.55rem;font-weight:500;color:var(--gold2);letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:1px;font-family:'DM Sans',sans-serif}
.card-btn{
  width:26px;height:26px;border-radius:50%;
  border:1px solid var(--bord2);background:transparent;
  color:var(--gold);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;transition:all .2s;flex-shrink:0;
}
.card-btn:active{background:var(--gold);color:var(--bg);border-color:var(--gold)}

/* ═══ MODAL ═══ */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.9);
  display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--bg3);
  border:1px solid var(--bord2);
  border-radius:18px 18px 0 0;
  width:100%;max-height:92vh;
  overflow-y:auto;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  padding-bottom:calc(1.5rem + var(--safe-bottom));
  position:relative;
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--bord2);border-radius:2px;margin:12px auto 0}
.modal-img{width:calc(100% - 2rem);aspect-ratio:4/3;background:var(--bg2);overflow:hidden;margin-top:.75rem;border-radius:10px;margin-left:1rem;}
.modal-img img{width:100%;height:100%;object-fit:cover;display:block}
.modal-body{padding:1.2rem 1rem}
.modal-cat{font-size:.58rem;font-family:'DM Mono',monospace;letter-spacing:.2em;text-transform:uppercase;color:var(--gold2)}
.gold-line{width:32px;height:2px;background:linear-gradient(to right,var(--gold),transparent);margin:.4rem 0;border-radius:1px}
.modal-name{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--cream);line-height:1.1;letter-spacing:-.01em;margin-bottom:.6rem}
.modal-desc{font-size:.82rem;color:var(--dim);line-height:1.65;margin-bottom:1rem}

/* ═══ EXTRAS/VARIANTS ═══ */
.modal-extras{margin-bottom:1.2rem}
.extras-section{margin-bottom:.9rem}
.extras-section-title{
  font-size:.58rem;font-family:'DM Mono',monospace;
  letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold);margin-bottom:.5rem;
  display:flex;align-items:center;gap:.5rem;
}
.extras-section-title::after{content:'';flex:1;height:1px;background:var(--bord)}
.extras-chips{display:flex;flex-wrap:wrap;gap:.35rem}
.extra-chip{
  display:inline-flex;align-items:center;gap:.3rem;
  padding:.3rem .65rem;border-radius:20px;
  border:1px solid var(--bord);background:var(--bg2);
  font-size:.68rem;color:var(--dim);font-family:'DM Sans',sans-serif;
  cursor:default;transition:all .15s;
}
.extra-chip .extra-price{
  color:var(--gold);font-family:'DM Mono',monospace;
  font-size:.62rem;font-weight:500;
}
.extra-chip.free .extra-price{color:var(--green)}
.extra-chip.select-chip{cursor:pointer;}
.extra-chip.select-chip.selected{border-color:var(--bord2);background:var(--glow);color:var(--cream)}
.extra-chip.select-chip:active{transform:scale(.95)}

.modal-footer{display:flex;align-items:center;justify-content:space-between;padding-top:1rem;border-top:1px solid var(--bord);gap:.7rem}
.modal-price-label{font-size:.58rem;font-family:'DM Mono',monospace;letter-spacing:.2em;text-transform:uppercase;color:var(--gold2);display:block;margin-bottom:2px}
.modal-price{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--gold);letter-spacing:-.02em}
.modal-order-btn{
  background:var(--gold);color:var(--bg);border:none;
  border-radius:50px;padding:.75rem 1.5rem;
  font-family:'DM Sans',sans-serif;font-weight:600;
  font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;transition:all .2s;
  box-shadow:0 4px 20px rgba(201,162,39,.35);
  white-space:nowrap;
}
.modal-order-btn:active{transform:scale(.97)}
.modal-wpp-btn{
  display:flex;align-items:center;gap:.4rem;
  padding:.75rem 1rem;border-radius:50px;
  border:1px solid rgba(37,211,102,.3);
  background:rgba(37,211,102,.08);
  color:#25d366;font-size:.75rem;font-weight:600;
  font-family:'DM Sans',sans-serif;letter-spacing:.04em;
  cursor:pointer;text-decoration:none;
  transition:all .2s;white-space:nowrap;
}
.modal-wpp-btn:active{background:rgba(37,211,102,.18)}
.modal-close-btn{
  position:absolute;top:.75rem;right:1rem;
  width:32px;height:32px;border-radius:50%;
  border:1px solid var(--bord2);background:rgba(8,6,9,.7);
  color:var(--cream);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;
}

/* ═══ TAP BATS CONTAINER ═══ */
#tapBats{position:fixed;inset:0;pointer-events:none;z-index:150;overflow:hidden}
.tap-bat{position:absolute;pointer-events:none;will-change:transform,opacity}

/* ═══ DESKTOP OVERRIDES ═══ */
@media(min-width:768px){
  #app{padding-bottom:0}
  .bottom-nav{display:none}
  .sidebar{
    display:block;width:200px;flex-shrink:0;
    position:sticky;top:72px;
    padding:1.5rem 1rem 1.5rem 0;
    max-height:calc(100vh - 72px);overflow-y:auto;
  }
  .sidebar::-webkit-scrollbar{width:2px}
  .sidebar-label{font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold2);font-family:'DM Mono',monospace;margin-bottom:.8rem;padding-left:.6rem}
  .nav-item{
    display:flex;align-items:center;gap:.5rem;
    padding:.5rem .6rem;border-radius:6px;cursor:pointer;
    transition:all .2s;border:1px solid transparent;
    margin-bottom:2px;text-decoration:none;
    color:var(--dim);font-size:.78rem;white-space:nowrap;
  }
  .nav-item:hover{background:var(--glow);color:var(--cream);border-color:var(--bord)}
  .nav-item.active{background:var(--glow);color:var(--gold);border-color:var(--bord2);font-weight:600}
  .nav-item .ni{font-size:.85rem;flex-shrink:0}
  .main{padding:1.5rem 0 2rem 1.5rem;border-left:1px solid var(--bord)}
  .grid{grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1rem}
  .grid-wide{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
  .modal-overlay{align-items:center;padding:1rem}
  .modal{border-radius:14px;max-width:520px;width:100%;max-height:88vh;transform:scale(.95) translateY(8px)}
  .modal-overlay.open .modal{transform:scale(1) translateY(0)}
  .modal-img{width:calc(100% - 2rem);margin-left:1rem;border-radius:10px}
  .header-search-btn{display:none}
  .header-search-desktop{display:block}
  .header-status{display:flex}
  .header-inner{gap:1rem;padding:.9rem 1.5rem}
}
@media(min-width:1024px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}
  .grid-wide{grid-template-columns:repeat(auto-fill,minmax(270px,1fr))}
}
</style>
</head>
<body>

<canvas id="batCanvas"></canvas>
<div id="floatParticles"></div>

<!-- ════ HERO ════ -->
<div id="hero">
  <div class="hero-bat-wrap">
    <!-- Morcego SVG v5: asas se originam na altura da cabeça, trailing edge desce como capa -->

// ══ CANVAS BATS (background horizontal drift) ══
(function(){
  const canvas = document.getElementById('batCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  let W, H, bats=[], rafId;

  function resize(){
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W*dpr; canvas.height = H*dpr;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function makeBat(i){
    return {
      x: Math.random()*W, baseY: Math.random()*H,
      y: 0, vx: (Math.random()>.5?1:-1)*(0.3+Math.random()*.5),
      phase: Math.random()*Math.PI*2,
      wPhase: Math.random()*Math.PI*2,
      wSpeed: 0.06+Math.random()*.04,
      size: (W<600?10:14)+Math.random()*10,
      alpha: 0.13+Math.random()*.15,
      amp: 20+Math.random()*35,
      freq: 0.008+Math.random()*.006,
      t: Math.random()*500
    };
  }

  function drawBat(bat){
    const {x,y,size,wPhase,alpha,vx} = bat;
    const w=size, h=size*.45;
    const wf = Math.sin(wPhase)*h*.65;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#c9a227';
    ctx.translate(x,y);
    if(vx<0) ctx.scale(-1,1);
    ctx.beginPath();
    ctx.moveTo(-w*.1,-h*.2);
    ctx.bezierCurveTo(-w*.35,wf-h*.35,-w*.72,wf*.8,-w,wf*.4);
    ctx.bezierCurveTo(-w*.68,h*.45,-w*.32,h*.28,-w*.1,h*.18);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(w*.1,-h*.2);
    ctx.bezierCurveTo(w*.35,wf-h*.35,w*.72,wf*.8,w,wf*.4);
    ctx.bezierCurveTo(w*.68,h*.45,w*.32,h*.28,w*.1,h*.18);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0,0,w*.1,h*.5,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function tick(){
    ctx.clearRect(0,0,W,H);
    bats.forEach(b=>{
      b.t++; b.wPhase+=b.wSpeed;
      b.x+=b.vx;
      b.y = b.baseY + Math.sin(b.t*b.freq)*b.amp;
      if(b.x<-b.size*3) b.x=W+b.size;
      else if(b.x>W+b.size*3) b.x=-b.size;
      drawBat(b);
    });
    rafId=requestAnimationFrame(tick);
  }

  function init(){
    resize();
    const n = W<600?3:6;
    bats = Array.from({length:n},(_,i)=>makeBat(i));
    if(rafId) cancelAnimationFrame(rafId);
    tick();
  }

  window.addEventListener('resize',()=>{resize(); bats.forEach(b=>{if(b.x>W)b.x=W*.9; if(b.baseY>H)b.baseY=H*.9;})});
  document.addEventListener('visibilitychange',()=>{ if(document.hidden){cancelAnimationFrame(rafId);}else{tick();}});
  init();
})();

// ══ FLOATING PARTICLES (anti-gravity — drift upward) ══
(function(){
  const SYMBOLS = ['🦇','🍹','🥂','🍸','🍺','🦇','🦇'];
  const container = document.getElementById('floatParticles');
  let active = 0;
  const MAX = window.innerWidth < 600 ? 6 : 10;

  function spawn(){
    if(active >= MAX || document.hidden) return;
    active++;
    const el = document.createElement('span');
    el.className = 'fp';
    const x = 5 + Math.random() * 90;
    const dur = 9 + Math.random() * 10;
    const fx = (Math.random() - .5) * 80;
    const fr = (Math.random() - .5) * 360;
    const sz = 10 + Math.random() * 14;
    el.textContent = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
    el.style.cssText = `left:${x}%;font-size:${sz}px;animation-duration:${dur}s;--fx:${fx}px;--fr:${fr}deg;`;
    container.appendChild(el);
    setTimeout(()=>{ el.remove(); active--; }, (dur + .5) * 1000);
  }

  setInterval(spawn, 1400);
  // Initial burst
  for(let i=0; i<3; i++) setTimeout(spawn, i*400);
})();

// ══ HERO ══
const hero = document.getElementById('hero');
function dismissHero(){
  hero.classList.add('out');
  setTimeout(()=>{ hero.style.display='none'; },650);
  sessionStorage.setItem('morcego_visited','1');
}
if(sessionStorage.getItem('morcego_visited')){
  hero.style.display='none';
} else {
  document.getElementById('heroCta').addEventListener('click', e=>{ e.stopPropagation(); dismissHero(); });
  hero.addEventListener('click', dismissHero);
}

// ══ SEARCH TOGGLE (mobile) ══
const searchToggle = document.getElementById('searchToggle');
const searchBar = document.getElementById('searchBar');
const searchMobile = document.getElementById('searchMobile');
searchToggle.addEventListener('click',()=>{
  searchBar.classList.toggle('open');
  if(searchBar.classList.contains('open')) searchMobile.focus();
});

function doSearch(q){
  q = q.toLowerCase().trim();
  document.querySelectorAll('.section').forEach(sec=>{
    let vis=0;
    sec.querySelectorAll('.card').forEach(c=>{
      const m = !q||c.textContent.toLowerCase().includes(q);
      c.style.display=m?'':'none';
      if(m)vis++;
    });
    sec.style.display=vis===0&&q?'none':'';
  });
  document.querySelectorAll('.nav-item,.bnav-item').forEach(n=>{
    const s=document.getElementById(n.dataset.cat);
    n.style.opacity=s&&s.style.display==='none'?'.3':'';
  });
}
searchMobile.addEventListener('input',e=>doSearch(e.target.value));
document.getElementById('searchDesktop').addEventListener('input',e=>doSearch(e.target.value));

// ══ BUILD NAV ══
function buildNav(){
  const sidebar=document.getElementById('sidebarNav');
  const bottomNav=document.getElementById('bottomNav');
  categories.forEach((cat,i)=>{
    const a=document.createElement('a');
    a.href='#'+cat.id; a.className='nav-item'+(i===0?' active':'');
    a.dataset.cat=cat.id;
    a.innerHTML=`<span class="ni">${cat.icon}</span>${cat.name}`;
    sidebar.appendChild(a);
    const b=document.createElement('a');
    b.href='#'+cat.id; b.className='bnav-item'+(i===0?' active':'');
    b.dataset.cat=cat.id;
    b.innerHTML=`<span class="bnav-icon">${cat.icon}</span>${cat.name}`;
    bottomNav.appendChild(b);
  });
}

// ══ BUILD CONTENT ══
function buildContent(){
  const main=document.getElementById('mainContent');
  categories.forEach(cat=>{
    const sec=document.createElement('section');
    sec.className='section'; sec.id=cat.id;
    sec.innerHTML=`<div class="section-header"><span class="section-emoji">${cat.icon}</span><h2 class="section-title">${cat.name}</h2><span class="section-count">${cat.items.length} ${cat.items.length===1?'item':'itens'}</span></div>`;
    const grid=document.createElement('div');
    grid.className='grid'+(cat.wide?' grid-wide':'');
    cat.items.forEach(item=>{
      const card=document.createElement('div');
      card.className='card';
      card.addEventListener('click',()=>{ openModal(item,cat); if(navigator.vibrate) navigator.vibrate(18); });
      const prefix=item.prefix?`<span class="card-price-prefix">${item.prefix}</span>`:'';
      const tag=item.tag?`<span class="card-tag ${item.tag}">${item.tag==='vegano'?'🌱 VEGANO':item.tag}</span>`:'';
      const extrasTag=item.extras?`<span class="card-tag" style="right:6px;left:auto;top:6px;background:rgba(201,162,39,.18);color:var(--gold);border-color:var(--bord2)">+ opções</span>`:'';
      card.innerHTML=`
        <div class="card-img"><img src="${item.img}" alt="${item.name}" loading="lazy">${tag}${extrasTag}</div>
        <div class="card-body">
          <div class="card-name">${item.name}</div>
          <div class="card-desc">${item.desc}</div>
          <div class="card-footer"><div>${prefix}<span class="card-price">${item.price}</span></div><button class="card-btn" aria-label="Ver produto">+</button></div>
        </div>`;
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    main.appendChild(sec);
  });
}

// ══ MODAL ══
let modalStartY=0;
let currentItem=null;

function buildExtras(extras){
  if(!extras||!extras.length) return '';
  return extras.map(section=>{
    const isSelect = section.type === 'select';
    const chips = section.opts.map((opt,i)=>{
      const priceHtml = opt.price
        ? `<span class="extra-price">${opt.price}</span>`
        : '';
      const freeClass = opt.price && opt.price.toLowerCase().includes('grát') ? ' free' : '';
      const selectClass = isSelect ? ' select-chip' : '';
      const selectedClass = isSelect && i===0 ? ' selected' : '';
      return `<button class="extra-chip${freeClass}${selectClass}${selectedClass}" data-section="${section.title}">${opt.name}${priceHtml}</button>`;
    }).join('');
    const typeHint = isSelect ? '<span style="font-size:.5rem;color:var(--dim);margin-left:.4rem;text-transform:none;letter-spacing:0">escolha</span>' : '';
    return `<div class="extras-section">
      <div class="extras-section-title">${section.title}${typeHint}</div>
      <div class="extras-chips">${chips}</div>
    </div>`;
  }).join('');
}

function openModal(item,cat){
  currentItem=item;
  const overlay=document.getElementById('modalOverlay');
  const imgWrap=document.getElementById('modalImg');
  document.getElementById('modalCat').textContent=cat.icon+' '+cat.name;
  document.getElementById('modalName').textContent=item.name;
  document.getElementById('modalDesc').textContent=item.desc;
  document.getElementById('modalPrice').textContent=item.price;
  document.getElementById('modalPriceLabel').textContent=item.prefix||'Valor';
  document.getElementById('modalExtras').innerHTML=buildExtras(item.extras);
  imgWrap.innerHTML='';
  const img=document.createElement('img');
  img.src=item.img; img.alt=item.name;
  imgWrap.appendChild(img);
  // WhatsApp link
  const wppBtn = document.getElementById('modalWpp');
  if(WPP_NUMBER){
    const wppMsg = encodeURIComponent(`Olá! Quero pedir:\n*${item.name}* — ${item.price}\n\nCardápio: MORCEGO Lanchonete, Santo André`);
    wppBtn.href=`https://wa.me/${WPP_NUMBER}?text=${wppMsg}`;
    wppBtn.style.display='';
  } else {
    wppBtn.style.display='none';
  }
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
  // select chip interaction
  document.getElementById('modalExtras').querySelectorAll('.select-chip').forEach(chip=>{
    chip.addEventListener('click',()=>{
      const sec=chip.dataset.section;
      document.getElementById('modalExtras').querySelectorAll(`.select-chip[data-section="${sec}"]`).forEach(c=>c.classList.remove('selected'));
      chip.classList.add('selected');
    });
  });
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
  currentItem=null;
}
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.getElementById('modalOrderBtn').addEventListener('click',()=>{
  if(navigator.vibrate) navigator.vibrate([15,10,15]);
  const wppLink = document.getElementById('modalWpp').href;
  if(wppLink && wppLink !== '#') window.open(wppLink, '_blank');
});
const modal=document.getElementById('modal');
modal.addEventListener('touchstart',e=>{ modalStartY=e.touches[0].clientY; },{passive:true});
modal.addEventListener('touchend',e=>{
  const dy=e.changedTouches[0].clientY-modalStartY;
  if(dy>80&&modal.scrollTop===0) closeModal();
},{passive:true});

// ══ TAP BATS ══
function spawnBat(x,y){
  const container=document.getElementById('tapBats');
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','-32 -24 64 40');
  const s=26+Math.random()*16;
  svg.style.cssText=`position:absolute;left:${x-s/2}px;top:${y-s/2}px;width:${s}px;height:${s}px;pointer-events:none;opacity:.92;`;
  svg.innerHTML=`
    <path d="M-3,-3 C-11,-12 -24,-14 -30,-9 C-24,-2 -14,3 -5,5 C-3,6 -3,3 -3,0Z" fill="#c9a227"/>
    <path d="M3,-3 C11,-12 24,-14 30,-9 C24,-2 14,3 5,5 C3,6 3,3 3,0Z" fill="#c9a227"/>
    <ellipse cx="0" cy="-1" rx="4.5" ry="7" fill="#c9a227"/>
    <path d="M-2,-8 L-5,-19 L1,-9Z" fill="#c9a227"/>
    <path d="M2,-8 L5,-19 L-1,-9Z" fill="#c9a227"/>
    <circle cx="-1.8" cy="-4" r="1.4" fill="#cc2211"/>
    <circle cx="1.8" cy="-4" r="1.4" fill="#cc2211"/>
    <line x1="-1" y1="2" x2="-1.5" y2="5" stroke="#c9a227" stroke-width="1.2" stroke-linecap="round" opacity=".8"/>
    <line x1="1" y1="2" x2="1.5" y2="5" stroke="#c9a227" stroke-width="1.2" stroke-linecap="round" opacity=".8"/>
  `;
  container.appendChild(svg);
  const angle=Math.random()*Math.PI*2;
  const dist=60+Math.random()*80;
  const dx=Math.cos(angle)*dist, dy=Math.sin(angle)*dist;
  requestAnimationFrame(()=>{
    svg.style.transition='transform .7s ease-out,opacity .7s ease-out';
    svg.style.transform=`translate(${dx}px,${dy}px) scale(.2) rotate(${Math.random()*360}deg)`;
    svg.style.opacity='0';
  });
  setTimeout(()=>svg.remove(),750);
}
document.addEventListener('touchend',e=>{
  if(e.target.closest('#hero')||e.target.closest('.modal-overlay')||e.target.closest('.header')||e.target.closest('.bottom-nav')) return;
  const t=e.changedTouches[0];
  spawnBat(t.clientX,t.clientY);
  if(Math.random()>.4) setTimeout(()=>spawnBat(t.clientX+(Math.random()-.5)*30,t.clientY+(Math.random()-.5)*30),120);
},{passive:true});
document.addEventListener('click',e=>{
  if(e.target.closest('#hero')||e.target.closest('.modal-overlay')||e.target.closest('.header')||e.target.closest('.search-input')||e.target.closest('.card-btn')) return;
  spawnBat(e.clientX,e.clientY);
},{passive:true});

// ══ ACTIVE NAV ON SCROLL ══
function updateNav(){
  const secs=document.querySelectorAll('.section');
  const sy=window.scrollY+140;
  let cur=secs[0]?.id;
  secs.forEach(s=>{ if(s.offsetTop<=sy) cur=s.id; });
  document.querySelectorAll('.nav-item,.bnav-item').forEach(n=>{
    n.classList.toggle('active',n.dataset.cat===cur);
  });
  const active=document.querySelector('.bnav-item.active');
  if(active) active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}
window.addEventListener('scroll',updateNav,{passive:true});

// ══ STATUS ABERTO/FECHADO ══
// QUI 18h-01h | SEX 19h-01h | SAB 18h-01h | DOM 17h-22h | SEG-QUA fechado
function updateStatus(){
  const now = new Date();
  const day = now.getDay(); // 0=dom,1=seg,2=ter,3=qua,4=qui,5=sex,6=sab
  const h = now.getHours();
  const isOpen = (
    (day === 4 && h >= 18) ||                    // qui: 18h→meia-noite
    (day === 5 && h < 1)   ||                    // sex: meia-noite→01h (vira do qui)
    (day === 5 && h >= 19) ||                    // sex: 19h→meia-noite
    (day === 6 && h < 1)   ||                    // sab: meia-noite→01h (vira do sex)
    (day === 6 && h >= 18) ||                    // sab: 18h→meia-noite
    (day === 0 && h < 1)   ||                    // dom: meia-noite→01h (vira do sab)
    (day === 0 && h >= 17 && h < 22)             // dom: 17h→22h
  );
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusTxt');
  dot.classList.toggle('closed', !isOpen);
  txt.classList.toggle('closed', !isOpen);
  txt.textContent = isOpen ? 'Aberto' : 'Fechado';
}
updateStatus();
setInterval(updateStatus, 60000);

// ══ INIT ══
buildNav();
buildContent();
updateNav();
</script>
