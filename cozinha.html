<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morcego — Cozinha</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&family=Jost:wght@900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<style>
:root{
  --bg:#07060a;--bg2:#0f0d14;--bg3:#16131c;--card:#1a1724;
  --gold:#c9a227;--bord:rgba(201,162,39,.12);--bord2:rgba(201,162,39,.35);
  --cream:#ede5d0;--dim:#7a6a5a;--green:#3ecf6e;--red:#e53e3e;
  --orange:#f6a623;--blue:#6c8ef7;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold)}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:10;
  background:var(--bg2);border-bottom:1px solid var(--bord);
  display:flex;align-items:center;gap:1rem;padding:.7rem 1.2rem;
}
.topbar-logo{
  font-family:'Jost',sans-serif;font-weight:900;
  font-size:1.4rem;letter-spacing:.15em;
  color:#ffffff;-webkit-text-stroke:1px #c9a227;paint-order:stroke fill;
}
.topbar-sub{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);font-family:'DM Mono',monospace}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:.75rem}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem .9rem;border-radius:6px;border:none;font-size:.75rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-outline{background:transparent;border:1px solid var(--bord2);color:var(--cream)}
.btn-gold{background:var(--gold);color:#07060a}
.btn-sm{padding:.3rem .65rem;font-size:.7rem}
.refresh-txt{font-size:.6rem;color:var(--dim);font-family:'DM Mono',monospace}

/* ── CONTENT ── */
.content{padding:1rem;max-width:1400px;margin:0 auto}

/* ── COLUMNS ── */
.columns{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.col-header{
  display:flex;align-items:center;gap:.5rem;
  padding:.5rem .85rem;border-radius:8px;margin-bottom:.6rem;
  font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
  font-family:'DM Mono',monospace;
}
.col-header.new{background:rgba(246,166,35,.12);border:1px solid rgba(246,166,35,.3);color:var(--orange)}
.col-header.preparing{background:rgba(201,162,39,.1);border:1px solid var(--bord2);color:var(--gold)}
.col-header.ready{background:rgba(62,207,110,.1);border:1px solid rgba(62,207,110,.3);color:var(--green)}
.col-count{margin-left:auto;font-size:.9rem}

/* ── ORDER CARD ── */
.order-card{
  background:var(--card);border:1px solid var(--bord);border-radius:10px;
  overflow:hidden;margin-bottom:.7rem;
}
.order-card.is-new{border-color:var(--bord2);animation:pulse-card 1.5s ease-in-out infinite}
@keyframes pulse-card{0%,100%{box-shadow:0 0 0 0 rgba(201,162,39,0)}50%{box-shadow:0 0 0 4px rgba(201,162,39,.2)}}
.card-head{
  display:flex;align-items:center;gap:.65rem;
  padding:.6rem .85rem;background:var(--bg3);border-bottom:1px solid var(--bord);
}
.card-mesa{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--gold)}
.card-time{font-size:.62rem;color:var(--dim);font-family:'DM Mono',monospace;margin-left:auto}
.card-elapsed{font-size:.6rem;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:3px}
.card-elapsed.ok{background:rgba(62,207,110,.1);color:var(--green)}
.card-elapsed.warn{background:rgba(246,166,35,.15);color:var(--orange)}
.card-elapsed.late{background:rgba(229,62,62,.15);color:var(--red)}
.card-items{padding:.65rem .85rem}
.item-row{
  display:flex;align-items:baseline;gap:.5rem;
  padding:.3rem 0;border-bottom:1px solid var(--bord);font-size:.85rem;
}
.item-row:last-child{border-bottom:none}
.item-qty{
  font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;
  color:var(--gold);min-width:1.5rem;flex-shrink:0;
}
.item-name{flex:1}
.card-actions{
  display:flex;gap:.5rem;padding:.6rem .85rem;
  background:var(--bg3);border-top:1px solid var(--bord);
}
.card-actions .btn{flex:1;justify-content:center}

/* ── EMPTY STATE ── */
.empty{padding:2rem;text-align:center;color:var(--dim);font-size:.82rem}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--card);border:1px solid var(--bord2);border-radius:8px;
  padding:.6rem 1.2rem;font-size:.82rem;transition:transform .3s;z-index:999;
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* POPUP NOVO PEDIDO */
#newOrderPop{
  position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.85);
  display:none;align-items:center;justify-content:center;padding:1.5rem;
}
#newOrderPop.show{display:flex;animation:popIn .3s ease}
@keyframes popIn{from{opacity:0}to{opacity:1}}
.pop-card{
  background:var(--card);border:2px solid var(--orange);border-radius:16px;
  max-width:440px;width:100%;overflow:hidden;
  box-shadow:0 0 50px rgba(246,166,35,.4);animation:popScale .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popScale{from{transform:scale(.8)}to{transform:scale(1)}}
.pop-head{background:var(--orange);color:#07060a;padding:1rem 1.3rem;display:flex;align-items:center;gap:.6rem}
.pop-head .pop-bell{font-size:1.6rem;animation:ring .6s ease infinite}
@keyframes ring{0%,100%{transform:rotate(0)}25%{transform:rotate(15deg)}75%{transform:rotate(-15deg)}}
.pop-title{font-family:'Jost',sans-serif;font-weight:900;font-size:1.3rem;letter-spacing:.05em}
.pop-mesa{margin-left:auto;font-family:'Playfair Display',serif;font-weight:700;font-size:1.4rem}
.pop-body{padding:1.2rem 1.3rem;max-height:50vh;overflow-y:auto}
.pop-item{display:flex;gap:.6rem;padding:.45rem 0;border-bottom:1px solid var(--bord);font-size:1rem}
.pop-item:last-child{border-bottom:none}
.pop-item-qty{font-family:'Playfair Display',serif;font-weight:700;color:var(--gold);min-width:2rem}
.pop-extras{font-size:.75rem;color:var(--gold);font-family:'DM Mono',monospace}
.pop-note{font-size:.78rem;color:var(--orange);font-style:italic;font-weight:600}
.pop-actions{padding:1rem 1.3rem;display:flex;gap:.6rem;background:var(--bg3)}
.pop-actions .btn{flex:1;justify-content:center;padding:.8rem;font-size:.9rem}

/* STATUS EDIT MENU */
.status-menu{position:relative}
.status-btn{background:transparent;border:1px solid var(--bord2);color:var(--dim);border-radius:6px;padding:.3rem .5rem;font-size:.7rem;cursor:pointer}
.status-dropdown{
  position:absolute;top:100%;right:0;margin-top:4px;z-index:20;
  background:var(--bg2);border:1px solid var(--bord2);border-radius:8px;
  display:none;flex-direction:column;min-width:130px;overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,.5);
}
.status-dropdown.open{display:flex}
.status-dropdown button{background:none;border:none;color:var(--cream);text-align:left;padding:.5rem .75rem;font-size:.78rem;cursor:pointer}
.status-dropdown button:hover{background:var(--glow);color:var(--gold)}

/* LOGIN */
#loginWrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:9999;gap:1.2rem;padding:2rem}
#loginWrap .logo{font-family:'Jost',sans-serif;font-weight:900;font-size:3rem;letter-spacing:.15em;color:#fff;-webkit-text-stroke:2px var(--gold);paint-order:stroke fill}
#loginWrap .sub{font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);font-family:'DM Mono',monospace}
#loginWrap input{width:100%;max-width:320px;background:var(--bg3);border:1px solid var(--bord);border-radius:8px;padding:.75rem 1rem;color:var(--cream);font-size:.95rem;outline:none}
#loginWrap input:focus{border-color:var(--gold)}
#loginWrap .err{font-size:.75rem;color:var(--red);min-height:1rem}
#mainApp{display:none}
</style>
</head>
<body>

<div id="loginWrap">
  <div class="logo">MOCERGO</div>
  <div class="sub">🍳 Cozinha</div>
  <input type="email" id="emailInput" placeholder="Email" autocomplete="username">
  <input type="password" id="pwInput" placeholder="Senha" autocomplete="current-password">
  <button class="btn btn-gold" onclick="doLogin()" id="loginBtn" style="max-width:320px;width:100%;justify-content:center;padding:.75rem">Entrar</button>
  <div class="err" id="loginErr"></div>
</div>

<div id="mainApp">
<div class="topbar">
  <div>
    <div class="topbar-logo">MOCERGO</div>
    <div class="topbar-sub">🍳 Cozinha</div>
  </div>
  <div class="topbar-right">
    <span class="live-dot"></span>
    <span class="refresh-txt" id="refreshTxt">Atualiza em 5s</span>
    <button class="btn btn-outline btn-sm" onclick="render()">↻ Agora</button>
  </div>
</div>

<div class="content">
  <div class="columns">
    <!-- Novos -->
    <div>
      <div class="col-header new">🟡 Novos <span class="col-count" id="cnt-new">0</span></div>
      <div id="col-new"></div>
    </div>
    <!-- Preparando -->
    <div>
      <div class="col-header preparing">🟠 Preparando <span class="col-count" id="cnt-preparing">0</span></div>
      <div id="col-preparing"></div>
    </div>
    <!-- Prontos -->
    <div>
      <div class="col-header ready">🟢 Prontos <span class="col-count" id="cnt-ready">0</span></div>
      <div id="col-ready"></div>
    </div>
  </div>
</div>
</div><!-- /mainApp -->

<div id="toast"></div>

<!-- POPUP NOVO PEDIDO -->
<div id="newOrderPop" onclick="if(event.target===this)closePop()">
  <div class="pop-card">
    <div class="pop-head">
      <span class="pop-bell">🔔</span>
      <span class="pop-title">NOVO PEDIDO</span>
      <span class="pop-mesa" id="popMesa"></span>
    </div>
    <div class="pop-body" id="popBody"></div>
    <div class="pop-actions">
      <button class="btn btn-outline" onclick="closePop()">Fechar</button>
      <button class="btn btn-gold" id="popPrepBtn">🟠 Aceitar / Preparar</button>
    </div>
  </div>
</div>

<script>
// ══ AUTH ══
let _started=false;
function enterApp(){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('mainApp').style.display='block';
  if(!_started){ _started=true; startKitchen(); }
}
const COZINHA_ROLES=['admin','cozinha','garcom'];
async function doLogin(){
  const email=document.getElementById('emailInput').value.trim();
  const pw=document.getElementById('pwInput').value;
  const errEl=document.getElementById('loginErr');
  const btn=document.getElementById('loginBtn');
  if(!email||!pw){errEl.textContent='Preencha email e senha.';return;}
  btn.textContent='Entrando...';btn.disabled=true;
  const res=await sbSignIn(email,pw);
  if(res.ok){
    const role=await sbGetMyRole()||'admin';
    if(COZINHA_ROLES.includes(role)){ btn.textContent='Entrar';btn.disabled=false; enterApp(); }
    else{ await sbSignOut(); btn.textContent='Entrar';btn.disabled=false; errEl.textContent='Sem acesso à cozinha.'; setTimeout(()=>errEl.textContent='',2500); }
  } else {
    btn.textContent='Entrar';btn.disabled=false;
    errEl.textContent='Email ou senha incorretos.';setTimeout(()=>errEl.textContent='',2500);
  }
}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('emailInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
(async()=>{ const s=await sbGetSession(); if(s) enterApp(); })();

let _orders=[];
async function loadOrders(){
  try{ _orders=await sbGetOrders(); } catch(e){
    _orders=JSON.parse(localStorage.getItem('morcego_orders')||'[]');
  }
}
function getOrders(){return _orders;}
async function setOrderStatus(id,status){
  try{ await sbUpdateOrder(id,status); } catch(e){
    const orders=JSON.parse(localStorage.getItem('morcego_orders')||'[]');
    const o=orders.find(x=>x.id===id); if(o){o.status=status;}
    localStorage.setItem('morcego_orders',JSON.stringify(orders));
  }
  const o=_orders.find(x=>x.id===id); if(o) o.status=status;
}
let seenIds=new Set(JSON.parse(localStorage.getItem('morcego_cozinha_seen')||'[]'));
function markSeen(id){seenIds.add(id);localStorage.setItem('morcego_cozinha_seen',JSON.stringify([...seenIds]));}

function elapsed(ts){
  const ms=Date.now()-new Date(ts).getTime();
  const m=Math.floor(ms/60000);
  if(m<1) return{txt:'<1min',cls:'ok'};
  if(m<15) return{txt:m+'min',cls:'ok'};
  if(m<30) return{txt:m+'min',cls:'warn'};
  return{txt:m+'min',cls:'late'};
}

async function updateOrder(id,status){
  await setOrderStatus(id,status);
  markSeen(id); render();
  toast(status==='preparing'?'🟠 Preparando':status==='ready'?'🟢 Pronto':'Atualizado');
}

function buildCard(order){
  const isNew=!seenIds.has(order.id);
  const t=new Date(order.timestamp);
  const timeStr=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
  const el=elapsed(order.timestamp);
  const items=order.items.map(i=>{
    const ex=i.extras&&i.extras.length?`<div style="font-size:.7rem;color:var(--gold);font-family:'DM Mono',monospace;margin-top:2px">+ ${i.extras.map(e=>e.name).join(', ')}</div>`:'';
    const nt=i.note?`<div style="font-size:.72rem;color:var(--orange);font-style:italic;margin-top:2px;font-weight:600">✏️ ${i.note}</div>`:'';
    return `<div class="item-row">
      <div class="item-qty">${i.qty}x</div>
      <div class="item-name">${i.name}${ex}${nt}</div>
    </div>`;
  }).join('');
  const st=order.status;
  let mainAction='';
  if(st==='new'||st==='pending') mainAction=`<button class="btn btn-gold" onclick="updateOrder('${order.id}','preparing')">🟠 Preparando</button>`;
  else if(st==='preparing') mainAction=`<button class="btn btn-gold" onclick="updateOrder('${order.id}','ready')">🟢 Pronto</button>`;
  else if(st==='ready') mainAction=`<button class="btn btn-outline" onclick="updateOrder('${order.id}','delivered')">🔵 Entregue</button>`;
  // Menu editar status (qualquer status)
  const statusMenu=`<div class="status-menu">
    <button class="status-btn" onclick="event.stopPropagation();toggleStatusMenu('${order.id}')">✏️ status</button>
    <div class="status-dropdown" id="sd-${order.id}">
      <button onclick="event.stopPropagation();updateOrder('${order.id}','new')">🟡 Novo</button>
      <button onclick="event.stopPropagation();updateOrder('${order.id}','preparing')">🟠 Preparando</button>
      <button onclick="event.stopPropagation();updateOrder('${order.id}','ready')">🟢 Pronto</button>
      <button onclick="event.stopPropagation();updateOrder('${order.id}','delivered')">🔵 Entregue</button>
      <button onclick="event.stopPropagation();updateOrder('${order.id}','cancelled')">❌ Cancelar</button>
    </div>
  </div>`;
  return `<div class="order-card${isNew&&(st==='new'||st==='pending')?' is-new':''}" onclick="markSeen('${order.id}');this.classList.remove('is-new')">
    <div class="card-head">
      <div class="card-mesa">Mesa ${order.table}</div>
      <div class="card-elapsed ${el.cls}">${el.txt}</div>
      <div class="card-time">${timeStr}</div>
    </div>
    <div class="card-items">${items}</div>
    <div class="card-actions">${mainAction}${statusMenu}</div>
  </div>`;
}
function toggleStatusMenu(id){
  const dd=document.getElementById('sd-'+id);
  const wasOpen=dd.classList.contains('open');
  document.querySelectorAll('.status-dropdown').forEach(d=>d.classList.remove('open'));
  if(!wasOpen) dd.classList.add('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.status-menu')) document.querySelectorAll('.status-dropdown').forEach(d=>d.classList.remove('open'));
});

function render(){
  const orders=getOrders();
  const groups={new:[],preparing:[],ready:[]};
  orders.forEach(o=>{
    if(o.status==='new'||o.status==='pending') groups.new.push(o);
    else if(o.status==='preparing') groups.preparing.push(o);
    else if(o.status==='ready') groups.ready.push(o);
  });
  ['new','preparing','ready'].forEach(g=>{
    document.getElementById('cnt-'+g).textContent=groups[g].length;
    document.getElementById('col-'+g).innerHTML=
      groups[g].length?groups[g].map(buildCard).join(''):
      `<div class="empty">Nenhum pedido aqui.</div>`;
  });
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

// ══ POPUP NOVO PEDIDO ══
let _popOrderId=null;
function showPop(order){
  _popOrderId=order.id;
  document.getElementById('popMesa').textContent='Mesa '+order.table;
  document.getElementById('popBody').innerHTML=order.items.map(i=>{
    const ex=i.extras&&i.extras.length?`<div class="pop-extras">+ ${i.extras.map(e=>e.name).join(', ')}</div>`:'';
    const nt=i.note?`<div class="pop-note">✏️ ${i.note}</div>`:'';
    return `<div class="pop-item"><span class="pop-item-qty">${i.qty}x</span><span>${i.name}${ex}${nt}</span></div>`;
  }).join('');
  document.getElementById('popPrepBtn').onclick=()=>{ updateOrder(order.id,'preparing'); closePop(); };
  document.getElementById('newOrderPop').classList.add('show');
  // repete o som 2x pra chamar atenção
  setTimeout(playSound,700);
}
function closePop(){
  document.getElementById('newOrderPop').classList.remove('show');
  if(_popOrderId){ markSeen(_popOrderId); render(); _popOrderId=null; }
}

function playSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[660,.0],[880,.12],[660,.24]].forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;g.gain.setValueAtTime(.3,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.15);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.18);
    });
  }catch(e){}
}

// ══ START (após login) ══
function startKitchen(){
  // Realtime Supabase
  sbOnNewOrder((newOrder, updateEvent)=>{
    if(newOrder && !updateEvent){
      if(!seenIds.has(newOrder.id)){ playSound(); showPop(newOrder); }
      _orders.unshift(newOrder);
    } else if(updateEvent){
      const o=_orders.find(x=>x.id===updateEvent.id);
      if(o) o.status=updateEvent.status;
      else { _orders.unshift({id:updateEvent.id,table:updateEvent.table_number,items:updateEvent.items,status:updateEvent.status,timestamp:updateEvent.created_at}); }
    }
    render();
  });
  // Countdown UI + fallback refresh (detecta novos se realtime falhar)
  let countdown=15;
  setInterval(async()=>{
    countdown--;
    document.getElementById('refreshTxt').textContent=`Atualiza em ${countdown}s`;
    if(countdown<=0){
      const prevIds=new Set(_orders.map(o=>o.id));
      await loadOrders();
      // novo pedido nao visto que apareceu no refresh
      const fresh=_orders.find(o=>!prevIds.has(o.id)&&!seenIds.has(o.id)&&(o.status==='new'||o.status==='pending'));
      if(fresh){ playSound(); showPop(fresh); }
      render(); countdown=15;
    }
  },1000);
  // Init
  loadOrders().then(render);
}
</script>
</body>
</html>
