<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morcego — Cozinha</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<style>
:root{
  --bg:#07060a;--bg2:#0f0d14;--bg3:#16131c;--card:#1a1724;
  --gold:#c9a227;--bord:rgba(201,162,39,.12);--bord2:rgba(201,162,39,.35);
  --cream:#ede5d0;--dim:#7a6a5a;--green:#3ecf6e;--red:#e53e3e;
  --orange:#f6a623;--blue:#6c8ef7;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold)}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:10;
  background:var(--bg2);border-bottom:1px solid var(--bord);
  display:flex;align-items:center;gap:1rem;padding:.7rem 1.2rem;
}
.topbar-logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900;color:var(--gold);letter-spacing:.12em}
.topbar-sub{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);font-family:'DM Mono',monospace}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:.75rem}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem .9rem;border-radius:6px;border:none;font-size:.75rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-outline{background:transparent;border:1px solid var(--bord2);color:var(--cream)}
.btn-gold{background:var(--gold);color:#07060a}
.btn-sm{padding:.3rem .65rem;font-size:.7rem}
.refresh-txt{font-size:.6rem;color:var(--dim);font-family:'DM Mono',monospace}

/* ── CONTENT ── */
.content{padding:1rem;max-width:1400px;margin:0 auto}

/* ── COLUMNS ── */
.columns{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.col-header{
  display:flex;align-items:center;gap:.5rem;
  padding:.5rem .85rem;border-radius:8px;margin-bottom:.6rem;
  font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
  font-family:'DM Mono',monospace;
}
.col-header.new{background:rgba(246,166,35,.12);border:1px solid rgba(246,166,35,.3);color:var(--orange)}
.col-header.preparing{background:rgba(201,162,39,.1);border:1px solid var(--bord2);color:var(--gold)}
.col-header.ready{background:rgba(62,207,110,.1);border:1px solid rgba(62,207,110,.3);color:var(--green)}
.col-count{margin-left:auto;font-size:.9rem}

/* ── ORDER CARD ── */
.order-card{
  background:var(--card);border:1px solid var(--bord);border-radius:10px;
  overflow:hidden;margin-bottom:.7rem;
}
.order-card.is-new{border-color:var(--bord2);animation:pulse-card 1.5s ease-in-out infinite}
@keyframes pulse-card{0%,100%{box-shadow:0 0 0 0 rgba(201,162,39,0)}50%{box-shadow:0 0 0 4px rgba(201,162,39,.2)}}
.card-head{
  display:flex;align-items:center;gap:.65rem;
  padding:.6rem .85rem;background:var(--bg3);border-bottom:1px solid var(--bord);
}
.card-mesa{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--gold)}
.card-time{font-size:.62rem;color:var(--dim);font-family:'DM Mono',monospace;margin-left:auto}
.card-elapsed{font-size:.6rem;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:3px}
.card-elapsed.ok{background:rgba(62,207,110,.1);color:var(--green)}
.card-elapsed.warn{background:rgba(246,166,35,.15);color:var(--orange)}
.card-elapsed.late{background:rgba(229,62,62,.15);color:var(--red)}
.card-items{padding:.65rem .85rem}
.item-row{
  display:flex;align-items:baseline;gap:.5rem;
  padding:.3rem 0;border-bottom:1px solid var(--bord);font-size:.85rem;
}
.item-row:last-child{border-bottom:none}
.item-qty{
  font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;
  color:var(--gold);min-width:1.5rem;flex-shrink:0;
}
.item-name{flex:1}
.card-actions{
  display:flex;gap:.5rem;padding:.6rem .85rem;
  background:var(--bg3);border-top:1px solid var(--bord);
}
.card-actions .btn{flex:1;justify-content:center}

/* ── EMPTY STATE ── */
.empty{padding:2rem;text-align:center;color:var(--dim);font-size:.82rem}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--card);border:1px solid var(--bord2);border-radius:8px;
  padding:.6rem 1.2rem;font-size:.82rem;transition:transform .3s;z-index:999;
}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-logo">MORCEGO</div>
    <div class="topbar-sub">🍳 Cozinha</div>
  </div>
  <div class="topbar-right">
    <span class="live-dot"></span>
    <span class="refresh-txt" id="refreshTxt">Atualiza em 5s</span>
    <button class="btn btn-outline btn-sm" onclick="render()">↻ Agora</button>
  </div>
</div>

<div class="content">
  <div class="columns">
    <!-- Novos -->
    <div>
      <div class="col-header new">🟡 Novos <span class="col-count" id="cnt-new">0</span></div>
      <div id="col-new"></div>
    </div>
    <!-- Preparando -->
    <div>
      <div class="col-header preparing">🟠 Preparando <span class="col-count" id="cnt-preparing">0</span></div>
      <div id="col-preparing"></div>
    </div>
    <!-- Prontos -->
    <div>
      <div class="col-header ready">🟢 Prontos <span class="col-count" id="cnt-ready">0</span></div>
      <div id="col-ready"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let _orders=[];
async function loadOrders(){
  try{ _orders=await sbGetOrders(); } catch(e){
    _orders=JSON.parse(localStorage.getItem('morcego_orders')||'[]');
  }
}
function getOrders(){return _orders;}
async function setOrderStatus(id,status){
  try{ await sbUpdateOrder(id,status); } catch(e){
    const orders=JSON.parse(localStorage.getItem('morcego_orders')||'[]');
    const o=orders.find(x=>x.id===id); if(o){o.status=status;}
    localStorage.setItem('morcego_orders',JSON.stringify(orders));
  }
  const o=_orders.find(x=>x.id===id); if(o) o.status=status;
}
let seenIds=new Set(JSON.parse(localStorage.getItem('morcego_cozinha_seen')||'[]'));
function markSeen(id){seenIds.add(id);localStorage.setItem('morcego_cozinha_seen',JSON.stringify([...seenIds]));}

function elapsed(ts){
  const ms=Date.now()-new Date(ts).getTime();
  const m=Math.floor(ms/60000);
  if(m<1) return{txt:'<1min',cls:'ok'};
  if(m<15) return{txt:m+'min',cls:'ok'};
  if(m<30) return{txt:m+'min',cls:'warn'};
  return{txt:m+'min',cls:'late'};
}

async function updateOrder(id,status){
  await setOrderStatus(id,status);
  markSeen(id); render();
  toast(status==='preparing'?'🟠 Preparando':status==='ready'?'🟢 Pronto':'Atualizado');
}

function buildCard(order){
  const isNew=!seenIds.has(order.id);
  const t=new Date(order.timestamp);
  const timeStr=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
  const el=elapsed(order.timestamp);
  const items=order.items.map(i=>`
    <div class="item-row">
      <div class="item-qty">${i.qty}x</div>
      <div class="item-name">${i.name}</div>
    </div>`).join('');
  const st=order.status;
  let actions='';
  if(st==='new'||st==='pending') actions=`<button class="btn btn-gold" onclick="updateOrder('${order.id}','preparing')">🟠 Preparando</button>`;
  else if(st==='preparing') actions=`<button class="btn btn-gold" onclick="updateOrder('${order.id}','ready')">🟢 Pronto</button>`;
  return `<div class="order-card${isNew&&(st==='new'||st==='pending')?' is-new':''}" onclick="markSeen('${order.id}');this.classList.remove('is-new')">
    <div class="card-head">
      <div class="card-mesa">Mesa ${order.table}</div>
      <div class="card-elapsed ${el.cls}">${el.txt}</div>
      <div class="card-time">${timeStr}</div>
    </div>
    <div class="card-items">${items}</div>
    ${actions?`<div class="card-actions">${actions}</div>`:''}
  </div>`;
}

function render(){
  const orders=getOrders();
  const groups={new:[],preparing:[],ready:[]};
  orders.forEach(o=>{
    if(o.status==='new'||o.status==='pending') groups.new.push(o);
    else if(o.status==='preparing') groups.preparing.push(o);
    else if(o.status==='ready') groups.ready.push(o);
  });
  ['new','preparing','ready'].forEach(g=>{
    document.getElementById('cnt-'+g).textContent=groups[g].length;
    document.getElementById('col-'+g).innerHTML=
      groups[g].length?groups[g].map(buildCard).join(''):
      `<div class="empty">Nenhum pedido aqui.</div>`;
  });
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

function playSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[660,.0],[880,.12],[660,.24]].forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;g.gain.setValueAtTime(.3,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.15);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.18);
    });
  }catch(e){}
}

// Realtime Supabase
sbOnNewOrder((newOrder, updateEvent)=>{
  if(newOrder && !updateEvent){
    if(!seenIds.has(newOrder.id)) playSound();
    _orders.unshift(newOrder);
  } else if(updateEvent){
    const o=_orders.find(x=>x.id===updateEvent.id);
    if(o) o.status=updateEvent.status;
  }
  render();
});

// Countdown UI + fallback refresh
let countdown=30;
setInterval(async()=>{
  countdown--;
  document.getElementById('refreshTxt').textContent=`Atualiza em ${countdown}s`;
  if(countdown<=0){ await loadOrders(); render(); countdown=30; }
},1000);

// Init
loadOrders().then(render);
</script>
</body>
</html>
